name: CI

on:
  push:
    branches: [main, "feature/**", "feat/**", "fix/**", "codex/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - run: uv sync --frozen --extra dev
      - name: Format
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy --strict src
      - name: Offline tests
        run: uv run pytest -m "not network" --tb=short --cov=mommy_chaogu --cov-report=xml --cov-fail-under=70
      - name: Resource lifecycle gate
        run: uv run pytest tests/test_db_lifecycle.py -W error::ResourceWarning
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Install browser-smoke backend
        working-directory: .
        run: uv sync --frozen
      - name: Type check
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build
      - name: Install browser
        run: npx playwright install --with-deps chromium
      - name: Browser smoke
        run: npm run test:e2e

  migration:
    name: Database migration fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --frozen
      - run: uv run python scripts/smoke_migration.py

  cli:
    name: CLI entry points
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --frozen
      - name: Verify commands
        run: |
          timeout 30s uv run mommy-watchlist --help
          timeout 30s uv run mommy-monitor --help
          timeout 30s uv run mommy-cache --help
          timeout 30s uv run mommy-earnings --help
          timeout 30s uv run mommy-flows --help
          timeout 30s uv run mommy-semicon --help
          timeout 30s uv run mommy-report --help
          timeout 30s uv run mommy-agent --help
          timeout 30s uv run mommy-mcp --help
          timeout 30s uv run mommy-tui --help
          timeout 30s uv run mommy --help

  docker:
    name: Docker build and smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: mommy-chaogu:local
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Container health and permissions
        run: SKIP_BUILD=1 ./scripts/smoke_docker.sh

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Python vulnerabilities
        run: |
          uv export --frozen --no-dev --no-emit-project --format requirements-txt --output-file /tmp/mommy-requirements.txt
          uvx --from pip-audit pip-audit --disable-pip --no-deps --requirement /tmp/mommy-requirements.txt
      - name: Frontend vulnerabilities
        working-directory: web
        run: npm audit --audit-level=high

  release-gate:
    name: Release gate
    if: always()
    needs: [backend, frontend, migration, cli, docker, dependency-audit]
    runs-on: ubuntu-latest
    steps:
      - name: Require every gate
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python - <<'PY'
          import json, os, sys
          results = {name: job["result"] for name, job in json.loads(os.environ["NEEDS_JSON"]).items()}
          print(results)
          sys.exit(0 if all(result == "success" for result in results.values()) else 1)
          PY
